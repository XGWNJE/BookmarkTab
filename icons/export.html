<!DOCTYPE html>
<html>
<head>
  <title>导出图标</title>
  <style>
    body { font-family: system-ui; padding: 40px; background: #1a1a1a; color: white; }
    .icons { display: flex; gap: 40px; margin: 40px 0; }
    .icon-item { text-align: center; }
    .icon-item canvas { border: 1px solid #333; background: linear-gradient(135deg, #6ee7b7, #3b82f6, #8b5cf6); border-radius: 12px; }
    .icon-item p { margin: 10px 0 30px; color: #888; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 8px; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>BookmarkTab 图标导出</h1>
  <p>右键点击图片 → 另存为 PNG</p>

  <div class="icons">
    <div class="icon-item">
      <canvas id="icon16" width="16" height="16"></canvas>
      <p>16×16</p>
    </div>
    <div class="icon-item">
      <canvas id="icon48" width="48" height="48"></canvas>
      <p>48×48</p>
    </div>
    <div class="icon-item">
      <canvas id="icon128" width="128" height="128"></canvas>
      <p>128×128</p>
    </div>
  </div>

  <button onclick="downloadAll()">下载所有图标</button>

  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
      <defs>
        <linearGradient id="mainGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6ee7b7"/>
          <stop offset="50%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="innerShadow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#000000" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <rect x="12" y="12" width="104" height="104" rx="28" fill="url(#mainGrad)"/>
      <rect x="12" y="12" width="104" height="52" rx="28" fill="url(#shineGrad)"/>
      <path d="M64 28L40 44V92C40 94.2091 41.7909 96 44 96H84C86.2091 96 88 94.2091 88 92V44L64 28Z"
            fill="white" fill-opacity="0.95" stroke="white" stroke-width="2" stroke-linejoin="round"/>
      <path d="M64 28L40 44H88L64 28Z" fill="url(#innerShadow)"/>
      <rect x="52" y="58" width="24" height="4" rx="2" fill="url(#mainGrad)" fill-opacity="0.4"/>
      <rect x="52" y="68" width="16" height="4" rx="2" fill="url(#mainGrad)" fill-opacity="0.3"/>
    </svg>`;

    function drawIcon(size) {
      const canvas = document.getElementById('icon' + size);
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, size, size);
      img.src = 'data:image/svg+xml;base64,' + btoa(svg);
    }

    ['icon16', 'icon48', 'icon128'].forEach(id => {
      const size = parseInt(id.replace('icon', ''));
      drawIcon(size);
    });

    function downloadAll() {
      [16, 48, 128].forEach(size => {
        const canvas = document.getElementById('icon' + size);
        const link = document.createElement('a');
        link.download = 'icon' + size + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
